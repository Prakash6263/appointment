<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Chat - Speedy Chow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar - Chat List */
        .sidebar {
            width: 360px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .sidebar-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: #f5f5f5;
        }

        .search-box input::placeholder {
            color: #999;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-left: 3px solid transparent;
        }

        .chat-item:hover {
            background: #f9f9f9;
        }

        .chat-item.active {
            background: #f0f7ff;
            border-left-color: #00bcd4;
        }

        .chat-item-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .chat-item-content {
            flex: 1;
            min-width: 0;
        }

        .chat-item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .chat-item-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .chat-item-time {
            font-size: 12px;
            color: #999;
        }

        .chat-item-preview {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .chat-header-text h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .online-status {
            font-size: 12px;
            color: #4caf50;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .online-status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message-group {
            display: flex;
            margin-bottom: 8px;
        }

        .message-group.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message-group.received .message-bubble {
            background: #e8e8e8;
            color: #333;
        }

        .message-group.sent .message-bubble {
            background: #00bcd4;
            color: white;
        }

        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .message-group.sent .message-time {
            justify-content: flex-end;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: flex-end;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.5; }
            30% { opacity: 1; }
        }

        /* Input Area */
        .chat-input-area {
            padding: 16px 24px;
            border-top: 1px solid #e0e0e0;
            background: white;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            padding: 0 16px;
        }

        .input-field input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 14px;
            outline: none;
        }

        .input-field input::placeholder {
            color: #999;
        }

        .attach-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            color: #999;
            transition: color 0.2s;
        }

        .attach-btn:hover {
            color: #00bcd4;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00bcd4;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #00acc1;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-direction: column;
            gap: 16px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            opacity: 0.5;
        }

        /* Status Badge */
        .status-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 12px;
            height: 12px;
            background: #4caf50;
            border: 2px solid white;
            border-radius: 50%;
        }

        .status-badge.offline {
            background: #ccc;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
            }

            .chat-main {
                display: none;
            }

            .chat-main.active {
                display: flex;
            }
        }

        /* Scrollbar styling */
        .chat-list::-webkit-scrollbar,
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-list::-webkit-scrollbar-track,
        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-list::-webkit-scrollbar-thumb,
        .messages-area::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .chat-list::-webkit-scrollbar-thumb:hover,
        .messages-area::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .info-panel {
            background: #e3f2fd;
            border-left: 3px solid #2196f3;
            padding: 12px 16px;
            margin: 0 16px 16px;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar - Chat List -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Chat</h1>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search...">
                </div>
            </div>
            <div class="chat-list" id="chatList">
                <!-- Chat items will be dynamically added here -->
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-main" id="chatMain">
            <div class="info-panel">
                <strong>Provider Mode:</strong> You are logged in as a Service Provider (Speedy Chow). Open user-chat.html in another window to test messaging.
            </div>

            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="chat-header-avatar" id="headerAvatar">JW</div>
                    <div class="chat-header-text">
                        <h2 id="chatHeaderName">Select a chat</h2>
                        <div class="online-status" id="onlineStatus">
                            Offline
                        </div>
                    </div>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="empty-state">
                    <div>👋</div>
                    <div>Select a conversation to start messaging</div>
                </div>
            </div>

            <div class="chat-input-area" id="chatInputArea" style="display: none;">
                <div class="input-field">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Type a message..." 
                        autocomplete="off"
                    >
                    <button class="attach-btn" title="Attach file">📎</button>
                </div>
                <button class="send-btn" id="sendBtn" title="Send message">➤</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script>
        // Configuration
        const PROVIDER_CONFIG = {
            userId: '69d734fea77ec4ff093f2cd5',
            userType: 'provider',
            userName: 'provider-1',
            socketUrl: 'http://localhost:5000' // Update this to your server URL
        };

        // State
        let socket;
        let currentChat = null;
        let chats = [];
        let messages = {};

        // Mock data for demo
        const mockUsers = [
            { id: '69d64ce7f8afd3e501560fd9', name: 'cutomer123', avatar: 'JW' },
            { id: 'user_002', name: 'Davis Siphron', avatar: 'DS' },
            { id: 'user_003', name: 'Aspen Herwich', avatar: 'AH' },
            { id: 'user_004', name: 'Cheyenne Kenter', avatar: 'CK' },
            { id: 'user_005', name: 'Livia Ekstrom', avatar: 'LE' }
        ];

        // Initialize Socket.io
        function initSocket() {
            // Get JWT token from localStorage or sessionStorage
            const token = localStorage.getItem('jwt_token') || 'test_provider_token_12345';
            
            socket = io(PROVIDER_CONFIG.socketUrl, {
                auth: {
                    token: token
                },
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000,
                reconnectionAttempts: 5
            });

            // Socket events
            socket.on('connect', () => {
                console.log('[Provider Socket] Connected:', socket.id);
                
                // Notify server that provider joined
                socket.emit('join-chat', {
                    userId: PROVIDER_CONFIG.userId,
                    userType: PROVIDER_CONFIG.userType,
                    userName: PROVIDER_CONFIG.userName
                });
            });

            socket.on('receive-message', (data) => {
                console.log('[Provider] Received message:', data);
                
                // Determine chatId based on message direction
                let chatId = data.chatId;
                console.log('[v0] Message chatId:', chatId, 'SenderId:', data.senderId, 'ReceiverId:', data.receiverId);
                
                // Store message
                if (!messages[chatId]) {
                    messages[chatId] = [];
                }
                messages[chatId].push(data);
                console.log('[v0] Total messages for', chatId, ':', messages[chatId].length);

                // Update UI if this message is for current chat
                if (currentChat && currentChat.id === chatId) {
                    console.log('[v0] Displaying message for current chat:', chatId);
                    displayMessage(data);
                    scrollToBottom();
                }

                // Update chat preview
                updateChatPreview(chatId, data.message);
            });

            socket.on('user-typing', (data) => {
                console.log('[Provider] Typing:', data);
                if (currentChat && currentChat.id === data.chatId) {
                    showTypingIndicator(data.userName);
                }
            });

            socket.on('user-stop-typing', (data) => {
                console.log('[Provider] Stop typing:', data);
                if (currentChat && currentChat.id === data.chatId) {
                    hideTypingIndicator();
                }
            });

            socket.on('user-online', (data) => {
                console.log('[Provider] User online:', data);
                updateUserStatus('online');
            });

            socket.on('user-offline', (data) => {
                console.log('[Provider] User offline:', data);
                updateUserStatus('offline');
            });

            socket.on('disconnect', () => {
                console.log('[Provider Socket] Disconnected');
                updateUserStatus('offline');
            });

            socket.on('connect_error', (error) => {
                console.error('[Provider Socket] Error:', error);
            });
        }

        // Initialize chats list
        function initChats() {
            chats = mockUsers.map(user => ({
                id: user.id,
                name: user.name,
                avatar: user.avatar,
                status: 'online',
                lastMessage: 'Hey there! 👋',
                timestamp: new Date()
            }));

            renderChatList();
        }

        // Render chat list
        function renderChatList() {
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = chats.map(chat => `
                <div class="chat-item ${currentChat?.id === chat.id ? 'active' : ''}" onclick="selectChat('${chat.id}')">
                    <div style="position: relative;">
                        <div class="chat-item-avatar">${chat.avatar}</div>
                        <div class="status-badge ${chat.status === 'offline' ? 'offline' : ''}"></div>
                    </div>
                    <div class="chat-item-content">
                        <div class="chat-item-header">
                            <span class="chat-item-name">${chat.name}</span>
                            <span class="chat-item-time">${formatTime(chat.timestamp)}</span>
                        </div>
                        <div class="chat-item-preview">${chat.lastMessage}</div>
                    </div>
                </div>
            `).join('');
        }

        // Select chat
        function selectChat(chatId) {
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;

            currentChat = chat;
            
            // Show input area
            document.getElementById('chatInputArea').style.display = 'flex';
            document.getElementById('messagesArea').innerHTML = '';

            // Update header
            document.getElementById('chatHeaderName').textContent = chat.name;
            document.getElementById('headerAvatar').textContent = chat.avatar;
            updateUserStatus(chat.status);

            // Display existing messages
            if (messages[chatId]) {
                messages[chatId].forEach(msg => displayMessage(msg));
            }

            // Update UI
            renderChatList();
            scrollToBottom();
        }

        // Display message
        function displayMessage(data) {
            const messagesArea = document.getElementById('messagesArea');
            
            // Remove empty state if it exists
            const emptyState = messagesArea.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const isOwn = data.senderId === PROVIDER_CONFIG.userId;

            const messageGroup = document.createElement('div');
            messageGroup.className = `message-group ${isOwn ? 'sent' : 'received'}`;

            const messageBubble = document.createElement('div');
            messageBubble.className = 'message-bubble';
            messageBubble.textContent = data.message;

            messageGroup.appendChild(messageBubble);

            if (data.timestamp) {
                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                timeDiv.textContent = formatMessageTime(new Date(data.timestamp));
                messageGroup.appendChild(timeDiv);
            }

            messagesArea.appendChild(messageGroup);
        }

        // Show typing indicator
        function showTypingIndicator(userName) {
            console.log('[v0] Showing typing indicator for:', userName);
            const messagesArea = document.getElementById('messagesArea');
            
            // Remove existing typing indicator
            const existing = messagesArea.querySelector('.typing-group');
            if (existing) existing.remove();
            
            const typingGroup = document.createElement('div');
            typingGroup.className = 'message-group typing-group received';
            
            const typingContainer = document.createElement('div');
            typingContainer.className = 'typing-indicator';
            typingContainer.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            typingGroup.appendChild(typingContainer);
            messagesArea.appendChild(typingGroup);
            scrollToBottom();
        }

        // Hide typing indicator
        function hideTypingIndicator() {
            console.log('[v0] Hiding typing indicator');
            const messagesArea = document.getElementById('messagesArea');
            const existing = messagesArea.querySelector('.typing-group');
            if (existing) existing.remove();
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || !currentChat) return;

            const messageData = {
                chatId: currentChat.id,
                senderId: PROVIDER_CONFIG.userId,
                senderType: PROVIDER_CONFIG.userType,
                senderName: PROVIDER_CONFIG.userName,
                receiverId: currentChat.id,
                message: message,
                timestamp: new Date()
            };

            console.log('[v0] Sending message:', messageData);

            // Send via socket
            socket.emit('send-message', messageData);

            // Store in messages object
            if (!messages[currentChat.id]) {
                messages[currentChat.id] = [];
            }
            messages[currentChat.id].push(messageData);

            // Display message immediately
            displayMessage(messageData);

            // Clear input
            input.value = '';
            input.focus();

            // Scroll to bottom
            scrollToBottom();

            // Update chat preview
            updateChatPreview(currentChat.id, message);

            // Stop typing indicator
            socket.emit('stop-typing', { chatId: currentChat.id });
            hideTypingIndicator();
        }

        // Update chat preview
        function updateChatPreview(chatId, message) {
            const chat = chats.find(c => c.id === chatId);
            if (chat) {
                chat.lastMessage = message.substring(0, 50);
                chat.timestamp = new Date();
                renderChatList();
            }
        }

        // Update user status
        function updateUserStatus(status) {
            const statusEl = document.getElementById('onlineStatus');
            if (statusEl) {
                statusEl.textContent = status === 'online' ? 'Online' : 'Offline';
                statusEl.style.color = status === 'online' ? '#4caf50' : '#999';
            }
        }

        // Scroll to bottom
        function scrollToBottom() {
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Format time
        function formatTime(date) {
            const now = new Date();
            const diff = now - new Date(date);
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'now';
            if (minutes < 60) return `${minutes}m`;
            if (hours < 24) return `${hours}h`;
            if (days < 7) return `${days}d`;

            return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // Format message time
        function formatMessageTime(date) {
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        // Event listeners
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Typing indicator
        let typingTimeout;
        document.getElementById('messageInput').addEventListener('input', () => {
            if (currentChat) {
                socket.emit('typing', {
                    chatId: currentChat.id,
                    userName: PROVIDER_CONFIG.userName,
                    userType: PROVIDER_CONFIG.userType
                });

                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    socket.emit('stop-typing', { chatId: currentChat.id });
                }, 3000);
            }
        });

        // Initialize app
        function init() {
            console.log('[Provider] Initializing chat app...');
            initChats();
            initSocket();
        }

        // Start app when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
